site_name: Python Scripts & Tools Documentation
site_description: Comprehensive documentation for Python automation scripts, tools, and projects
site_author: Steven Chaplinski
site_url: https://pythons.avatararts.org

repo_name: pythons/docs
repo_url: https://github.com/avatararts/pythons
edit_uri: edit/main/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Python Scripts:
    - Overview: scripts/overview.md
    - Automation: scripts/automation.md
    - Data Processing: scripts/data-processing.md
    - Media Processing: scripts/media-processing.md
  - Tools & Utilities:
    - Tools Overview: tools/overview.md
    - CLI Tools: tools/cli-tools.md
    - Development Tools: tools/dev-tools.md
  - Projects:
    - Project Overview: projects/overview.md
    - Audio Generation: projects/audio-generation.md
    - Web Scraping: projects/web-scraping.md
    - API Integrations: projects/api-integrations.md
  - Documentation:
    - Documentation Index: docs/index.md
    - API Documentation: docs/api.md

plugins:
  - search
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/avatararts/pythons
  version:
    provider: mike
